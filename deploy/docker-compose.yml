version: "3.8"

services:
  agis-lp:
    image: agis-lp:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL}"
        VITE_SUPABASE_PUBLISHABLE_KEY: "${VITE_SUPABASE_PUBLISHABLE_KEY}"
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ── (Opcional) Descomente para usar com Traefik ──
  # Remova a seção "ports" acima e descomente abaixo:
  #
  # labels:
  #   - "traefik.enable=true"
  #   - "traefik.http.routers.agis-lp.rule=Host(`seudominio.com.br`)"
  #   - "traefik.http.routers.agis-lp.entrypoints=websecure"
  #   - "traefik.http.routers.agis-lp.tls.certresolver=letsencrypt"
  #   - "traefik.http.services.agis-lp.loadbalancer.server.port=80"
  # networks:
  #   - traefik-public

networks:
  app-network:
    driver: bridge
  # traefik-public:
  #   external: true
