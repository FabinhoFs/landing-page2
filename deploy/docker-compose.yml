services:
  agis-lp:
    image: agis-lp:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${APP_PORT:-3000}:80"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
    # ── Healthcheck ──
    # Controlado aqui (não embutido na imagem).
    # Para desativar temporariamente, comente o bloco abaixo
    # e adicione: healthcheck: { test: ["NONE"] }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app-network

    # ── (Opcional) Para usar com Traefik ──
    # 1. Remova a seção "ports" acima
    # 2. Descomente as labels abaixo
    # 3. Descomente a rede "traefik-public" no final
    #
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.agis-lp.rule=Host(`seudominio.com.br`)"
    #   - "traefik.http.routers.agis-lp.entrypoints=websecure"
    #   - "traefik.http.routers.agis-lp.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.agis-lp.loadbalancer.server.port=80"
    # networks:
    #   - traefik-public

networks:
  app-network:
    driver: bridge
  # traefik-public:
  #   external: true
