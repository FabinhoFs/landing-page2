services:
  agis-lp:
    image: agis-lp:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL}"
        VITE_SUPABASE_PUBLISHABLE_KEY: "${VITE_SUPABASE_PUBLISHABLE_KEY}"
        VITE_SUPABASE_PROJECT_ID: "${VITE_SUPABASE_PROJECT_ID}"
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

    # ── (Opcional) Para usar com Traefik ──
    # 1. Remova a seção "ports" acima
    # 2. Descomente as labels abaixo
    # 3. Descomente a rede "traefik-public" no final
    #
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.agis-lp.rule=Host(`seudominio.com.br`)"
    #   - "traefik.http.routers.agis-lp.entrypoints=websecure"
    #   - "traefik.http.routers.agis-lp.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.agis-lp.loadbalancer.server.port=80"
    # networks:
    #   - traefik-public

networks:
  app-network:
    driver: bridge
  # traefik-public:
  #   external: true
